# PIDNet-Large config for A100 80GB server
# Resolution: 512x512 (same as data, no resize)
# Batch size: 64 (~32GB VRAM)
# Epochs: 300

CUDNN:
  BENCHMARK: true
  DETERMINISTIC: false
  ENABLED: true
GPUS: (0,)
OUTPUT_DIR: 'output'
LOG_DIR: 'log'
WORKERS: 4
PRINT_FREQ: 100

DATASET:
  DATASET: custom
  # Change this to the actual path on server
  ROOT: 'data/PIDNet_Power_Dataset'
  TEST_SET: 'list/val.txt'
  TRAIN_SET: 'list/train.txt'
  NUM_CLASSES: 3

MODEL:
  NAME: pidnet_l
  NUM_OUTPUTS: 2
  # Download PIDNet_L_ImageNet.pth.tar from https://github.com/XuJiacong/PIDNet
  PRETRAINED: 'pretrained_models/imagenet/PIDNet_L_ImageNet.pth.tar'

LOSS:
  USE_OHEM: true
  OHEMTHRES: 0.7
  OHEMKEEP: 200000
  BALANCE_WEIGHTS: [0.4, 1.0]
  SB_WEIGHTS: 0.5

TRAIN:
  IMAGE_SIZE:
  - 512
  - 512
  BASE_SIZE: 640
  # PIDNet-L + 512x512 + batch=64 ~ 32GB
  BATCH_SIZE_PER_GPU: 64
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 300
  IGNORE_LABEL: 255
  OPTIMIZER: sgd
  LR: 0.01
  WD: 0.0005
  MOMENTUM: 0.9
  NESTEROV: false
  FLIP: true
  MULTI_SCALE: true
  SCALE_FACTOR: 16

TEST:
  IMAGE_SIZE:
  - 512
  - 512
  BASE_SIZE: 640
  BATCH_SIZE_PER_GPU: 16
  FLIP_TEST: false
  MULTI_SCALE: false
