CUDNN:
  BENCHMARK: true
  DETERMINISTIC: false
  ENABLED: true
GPUS: (0,)
OUTPUT_DIR: output
LOG_DIR: log
WORKERS: 4
PRINT_FREQ: 100

DATASET:
  DATASET: custom
  ROOT: data/PIDNet_Power_Dataset
  TEST_SET: list/val.txt
  TRAIN_SET: list/train.txt
  NUM_CLASSES: 5

MODEL:
  NAME: pidnet_s
  NUM_OUTPUTS: 2
  PRETRAINED: pretrained_models/cityscapes/PIDNet_S_Cityscapes_val.pt

LOSS:
  USE_OHEM: true
  OHEMTHRES: 0.9
  OHEMKEEP: 200000
  BALANCE_WEIGHTS: [0.4, 1.0]
  SB_WEIGHTS: 0.1

TRAIN:
  IMAGE_SIZE:
  - 512
  - 512
  BASE_SIZE: 640
  BATCH_SIZE_PER_GPU: 8
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 300
  IGNORE_LABEL: 255
  OPTIMIZER: sgd
  LR: 0.001
  WD: 0.0005
  MOMENTUM: 0.9
  NESTEROV: false
  FLIP: true
  MULTI_SCALE: true
  SCALE_FACTOR: 16

TEST:
  IMAGE_SIZE:
  - 512
  - 512
  BASE_SIZE: 640
  BATCH_SIZE_PER_GPU: 8
  FLIP_TEST: false
  MULTI_SCALE: false
